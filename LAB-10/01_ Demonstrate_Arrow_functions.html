<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Arrow Function Demonstration</h1>
    <script>
     
      let fun1 = (a) => {
        let b = 3;
        return a + b;
      };
      document.write(fun1(3) + "</br>");

      let fun2 = (a) => a * a;
      document.write(fun2(3) + "</br>");

      let fun3 = (a, b) => {
        return a + b;
      };

      document.write(fun3(3, 5) + "</br>");

      let fun4 = (a, b) => a + b;
      document.write(fun4(3, 5) + "</br>");

      

      let;
    </script>
  </body>
</html>
