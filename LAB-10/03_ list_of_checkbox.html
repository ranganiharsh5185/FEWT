<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Checkbox Demo</title>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        #result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h2>Select Roll Numbers</h2>

    <input type="checkbox" id="c1" value="101">
    Roll No 101

    <br><br>

    <input type="checkbox" id="c2" value="102">
    Roll No 102

    <br><br>

    <input type="checkbox" id="c3" value="103">
    Roll No 103

    <br><br>

    <input type="checkbox" id="c4" value="104">
    Roll No 104

    <div id="result">
        Selected Roll Numbers:
    </div>

    <script>

        document.getElementById("c1")
            .addEventListener("change", showData);

        document.getElementById("c2")
            .addEventListener("change", showData);

        document.getElementById("c3")
            .addEventListener("change", showData);

        document.getElementById("c4")
            .addEventListener("change", showData);


        function showData() {

            let data = "";
           
            if (document.getElementById("c1").checked) {
                data += document.getElementById("c1").value + ", ";
            }

            if (document.getElementById("c2").checked) {
                data += document.getElementById("c2").value + ", ";
            }

            if (document.getElementById("c3").checked) {
                data += document.getElementById("c3").value + ", ";
            }

            if (document.getElementById("c4").checked) {
                data += document.getElementById("c4").value;
            }

            document.getElementById("result").innerHTML =
                "Selected Roll Numbers: " + data;
        }

    </script>

</body>

</html>
