<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation Demo</title>

    <style>
        /* Color Change Box */
        .box {
            height: 100px;
            width: 100px;
            background-color: red;
            margin: 8px;
            padding: 8px;
            animation: colour 2s forwards;
        }

        @keyframes colour {
            from {
                background-color: red;
            }
            to {
                background-color: yellow;
            }
        }

        /* Moving Box */
        .boxmove {
            height: 20vh;
            width: 20vh;
            background-color: yellow;
            animation: box 10s 2s ease-in-out infinite reverse;
        }

        @keyframes box {
            0% {
                transform: translate(0, 0);
            }

            25% {
                transform: translate(300px, 0);
            }

            50% {
                transform: translate(300px, 300px);
            }

            75% {
                transform: translate(0, 300px);
            }

            100% {
                transform: translate(0, 0);
                background-color: red;
            }
        }
    </style>
</head>

<body>
    <div class="box"></div>

    <div class="boxmove"></div>
</body>
</html>
