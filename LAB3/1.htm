<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1</title>
</head>
<body>
    <script>
          num1=parseInt(prompt("enter num1"));
          num2=parseInt(prompt("enter num2"));

           choice=prompt("+,-,*,/");

           if(choice == "+")
           {
             ans=num1+num2;
             alert("add"+ans);
           }
             else if(choice == "-" )
             {
                ans=num1-num2;               
                alert("sub"+ans);
             }
              else if(choice == "*" )
             {
                ans=num1*num2;
                alert("mul"+ans);
             }
              else if(choice == "/" )
             {
                if(num2==0)
             {
                alert("num is no divisible");
             }
             else
             {
                ans=num1/num2;
                alert("divi"+ans);
             }
             }
             
             
           
    </script>
</body>
</html>
