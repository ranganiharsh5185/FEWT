<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2</title>
</head>
<body>
     <script>
        n=parseInt(prompt("enter a number:"));
        count=0;
        for(i=2;i<n;i++)
     {
            if(n%i==0)
            {
                count++;
            }
     }
     if(count==0)
     {
            document.write("prime num");
     }
     else
     {
         document.write(" not prime num");
     }
     </script>
</body>
</html>
