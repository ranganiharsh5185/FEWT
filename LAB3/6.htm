<body>
    <script>
          a=parseInt(prompt("enter number"));
          digit=0;
          n=a;
          m=a;
          sum=0;
          while(n>0)
          {
            digit++
            n=parseInt(n/10);
          }
          while(m>0)
          {
            sum+=Math.pow(m%10,digit);
            m=parseInt(m/10);
          }
       
          if(a==sum){
            document.write("armstrong no");
          }
          else
          {
            document.write("not armstrong");
          }
    </script>
