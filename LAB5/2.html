<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorting of Araay</title>
</head>
<body>
    <script>
        let n=parseInt(prompt("Enter size of Array: "))
        let arr=[]
        for (let i = 0; i < n; i++) {
            arr[i]=parseInt(prompt("Enter Array "+(i+1)+" : "));
        }
        let temp=arr[0]
        for (let i = 0; i < n; i++) {
            for (let j = i+1; j < n; j++) {
                if(arr[i]>arr[j]){
                temp=arr[i]
                arr[i]=arr[j]
                arr[j]=temp
            }   
            }
        }
        document.write("Sorted Array: "+arr)
    </script>
</body>
</html>
