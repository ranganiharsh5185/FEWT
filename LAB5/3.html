<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sort Array using bubble sort</title>
</head>
<body>
    <script>
        let n=parseInt(prompt("Enter size of Array: "))
        let arr=[]
        let temp
        for (let i = 0; i < n; i++) {
            arr[i]=parseInt(prompt("Enter Array "+(i+1)+" : "));
        }
        for (let i = 0; i < n ; i++) {
            for (let j = 0; j < n-i-1 ; j++) {
                if (arr[j]>arr[j+1]) {
                    temp=arr[j]
                    arr[j]=arr[j+1]
                    arr[j+1]=temp
                }
                
            }
        }
        document.write("Sorted Array:"+arr)
    </script>
</body>
</html>
