<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Validation Form</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: linear-gradient(135deg, #4e73df, #1cc88a);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .form-box {
        width: 450px;
        background: #fff;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      }

      h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #0d6efd;
        font-weight: bold;
      }

      .form-label {
        font-weight: 600;
      }

      .btn {
        width: 48%;
      }
    </style>
  </head>
  <body>
    <div class="form-box">
      <h2>User Validation Form</h2>

      <form onsubmit="validateForm(event)">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input
            type="text"
            id="username"
            class="form-control"
            placeholder="Enter Username"
          />
        </div>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input
            type="email"
            id="email"
            class="form-control"
            placeholder="Enter Email"
          />
        </div>

        <div class="mb-3">
          <label class="form-label">Mobile Number</label>
          <input
            type="text"
            id="mobile"
            class="form-control"
            placeholder="1234567890"
          />
        </div>

        <div class="mb-3">
          <label class="form-label">Date of Birth</label>
          <input type="date" id="dob" class="form-control" />
        </div>

        <div class="mb-3">
          <label class="form-label">Enrollment Number</label>
          <input
            type="text"
            id="enrollment"
            class="form-control"
            placeholder="11 Digit Enrollment"
          />
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" id="pass" class="form-control" />
        </div>

        <div class="mb-3">
          <label class="form-label">Confirm Password</label>
          <input type="password" id="cpass" class="form-control" />
        </div>

        <div class="d-flex justify-content-between">
          <button class="btn btn-primary" type="submit">Submit</button>
          <button class="btn btn-danger" type="reset">Reset</button>
        </div>
      </form>
    </div>

    <script>
      function validateForm(e) {
        e.preventDefault();

        let username = document.getElementById("username").value.trim();
        let email = document.getElementById("email").value.trim();
        let mobile = document.getElementById("mobile").value.trim();
        let dob = document.getElementById("dob").value;
        let enrollment = document.getElementById("enrollment").value.trim();
        let pass = document.getElementById("pass").value;
        let cpass = document.getElementById("cpass").value;

        // Username
        if (username.length < 8) {
          alert("Username must be at least 8 characters.");
          return;
        }

        // Email
        let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        if (!emailPattern.test(email)) {
          alert("Invalid Email Address.");
          return;
        }

        // Mobile
        let mobilePattern = /^[0-9]{10}$/;

        if (!mobilePattern.test(mobile)) {
          alert("Mobile number must be 10 digits.");
          return;
        }

      // Enrollment
      let enrollPattern = /^[0-9]{11}$/;

      if (!enrollPattern.test(enrollment)) {
        alert("Enrollment number must be exactly 11 digits.");
        return;
      }

      // Password
      let passwordPattern =
        /^(?=.*\d)(?=.*[@$!%*?&#])[A-Za-z\d@$!%*?&#]{8,12}$/;

      if (!passwordPattern.test(pass)) {
        alert(
          "Password must contain 8-12 characters, one digit and one special character.",
        );
        return;
      }

      // Confirm Password
      if (pass !== cpass) {
        alert("Passwords do not match.");
        return;
      }

      // Age from DOB
        let birthDate = new Date(dob);
        let today = new Date();

        let age = today.getFullYear() - birthDate.getFullYear();

        let month = today.getMonth() - birthDate.getMonth();

        if (month < 0 ||(month == 0 && today.getDate() < birthDate.getDate())) {
          age--;
        }

        if (age < 18) {
          alert("Age must be greater than 18.");
          return;
        }

        alert("Form Submitted Successfully!");
      }
    </script>
  </body>
</html>
