<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Validation Form</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: linear-gradient(135deg, #4e73df, #1cc88a);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .form-box {
        width: 450px;
        background: #fff;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      }

      h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #0d6efd;
        font-weight: bold;
      }

      .form-label {
        font-weight: 600;
      }

      .btn {
        width: 48%;
      }
    </style>
  </head>
  <body>
    <div class="form-box">
      <h2>User Validation Form</h2>

      <form id="form" novalidate>
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input
            type="text"
            id="username"
            class="form-control"
            placeholder="Enter Username"
          />
          <span id="usernameError" class="text-danger"></span>
        </div>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input
            type="email"
            id="email"
            class="form-control"
            placeholder="Enter Email"
          />
          <span id="emailError" class="text-danger"></span>
        </div>

        <div class="mb-3">
          <label class="form-label">Mobile Number</label>
          <input
            type="text"
            id="mobile"
            class="form-control"
            placeholder="1234567890"
          />
          <span id="mobileError" class="text-danger"></span>
        </div>

        <div class="mb-3">
          <label class="form-label">Date of Birth</label>
          <input type="date" id="dob" class="form-control" />
        </div>

        <div class="mb-3">
          <label class="form-label">Enrollment Number</label>
          <input
            type="text"
            id="enrollment"
            class="form-control"
            placeholder="11 Digit Enrollment"
          />
          <span id="enrollmentError" class="text-danger"></span>
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" id="pass" class="form-control" />
          <span id="passError" class="text-danger"></span>
        </div>

        <div class="mb-3">
          <label class="form-label">Confirm Password</label>
          <input type="password" id="cpass" class="form-control" />
          <span id="cpassError" class="text-danger"></span>
        </div>

        <div class="d-flex justify-content-between">
          <input class="btn btn-primary" type="submit" value="Submit" />
          <input class="btn btn-danger" type="reset" value="Reset" />
        </div>
      </form>
    </div>

    <script>
      document.getElementById("form").addEventListener("submit", function (e) {
        e.preventDefault();

        let username = document.getElementById("username").value;
        let email = document.getElementById("email").value;
        let mobile = document.getElementById("mobile").value;
        let dob = document.getElementById("dob").value;
        let enrollment = document.getElementById("enrollment").value;
        let pass = document.getElementById("pass").value;
        let cpass = document.getElementById("cpass").value;

        document.getElementById("emailError").innerHTML = " ";
        document.getElementById("usernameError").innerHTML = " ";
        document.getElementById("mobileError").innerHTML = " ";
        document.getElementById("enrollmentError").innerHTML = " ";
        document.getElementById("passError").innerHTML = " ";
        document.getElementById("cpassError").innerHTML = " ";

        let usernameerr = document.getElementById("usernameError");
        let emailerr = document.getElementById("emailError");
        let mobileerr = document.getElementById("mobileError");
        let enrollerr = document.getElementById("enrollmentError");
        let passerr = document.getElementById("passError");
        let cpasserr = document.getElementById("cpassError");

        let valid = true;

        let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        let mobilePattern = /^[0-9]{10}$/;
        let enrollPattern = /^[0-9]{11}$/;
        let passwordPattern = /^(?=.*\d)(?=.*[@$!%*?&#])[A-Za-z\d@$!%*?&#]{8,12}$/;


        if (username.length < 8) {
          usernameerr.innerHTML = "Username must be at least 8 characters.";
          valid = false;
        }

        if (!emailPattern.test(email)) {
          emailerr.innerHTML = "Invalid Email Address.";
          valid = false;
        }

        if (!mobilePattern.test(mobile)) {
          mobileerr.innerHTML = "Mobile number must be 10 digits.";
          valid = false;
        }

        if (!enrollPattern.test(enrollment)) {
          enrollerr.innerHTML = "Enrollment number must be exactly 11 digits.";
          valid = false;
        }

        if (!passwordPattern.test(pass)) {
          passerr.innerHTML =
            "Password must contain 8-12 characters, one digit and one special character.";
          valid = false;
        }

        if (pass !== cpass) {
          cpasserr.innerHTML = "Passwords do not match.";
          valid = false;
        }

        let birthDate = new Date(dob);
        let today = new Date();

        let age = today.getFullYear() - birthDate.getFullYear();

        let month = today.getMonth() - birthDate.getMonth();

        if (
          month < 0 ||
          (month == 0 && today.getDate() < birthDate.getDate())
        ) {
          age--;
        }

        if (age < 18) {
          ageerr.innerHTML = "You must be at least 18 years old to submit the form.";
          valid = false;
        }

        if (valid) {
            alert("Form Submitted Successfully!");
        }
      }
    );
    </script>
  </body>
</html>
